<!DOCTYPE html>
<html>
<head>
    <title>My Account Registration</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("https://images.unsplash.com/photo-1549924231-f129b911e442?auto=format&fit=crop&w=1920&q=80");
            background-size: cover;
            background-position: center;
            color: white;
        }
        .navbar {
            background-color: rgba(0,0,0,0.7);
        }
        .form-container {
            background-color: rgba(0,0,0,0.6);
            border: 3px solid gold;
            padding: 20px;
            margin: 50px auto;
            border-radius: 10px;
            max-width: 500px;
        }
        label {
            color: white;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 10px;
            border: 2px solid white;
        }
        #result {
            background: white;
            color: black;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Yasuo & Yone© </a>
        <div>
            <a class="text-white me-3" href="#">Home</a>
            <a class="text-white me-3" href="#">Create Account</a>
            <a class="text-white" href="#">Login</a>
        </div>
    </div>
</nav>

<h2 class="text-center mt-3">My Account Registration</h2>

<div class="form-container">
    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-pic">

    <label>Full Name:</label>
    <input type="text" id="name" class="form-control">

    <label>Email:</label>
    <input type="email" id="email" class="form-control">

    <label>Contact Number:</label>
    <input type="tel" id="contact" class="form-control">

    <label>Date of Birth:</label>
    <input type="date" id="dob" class="form-control">

    <label>Gender:</label>
    <select id="gender" class="form-control">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Prefer not to say</option>
    </select>

    <label>Password:</label>
    <input type="password" id="password" class="form-control">

    <label>Confirm Password:</label>
    <input type="password" id="confirmPassword" class="form-control">

    <button onclick="createAccount()" class="btn btn-warning w-100 mt-2">Create Account</button>

    <div id="result"></div>
</div>

<script>
function createAccount() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let contact = document.getElementById("contact").value;
    let dob = document.getElementById("dob").value;
    let gender = document.getElementById("gender").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    if (!name || !email || !contact || !dob || !gender || !password || !confirmPassword) {
        document.getElementById("result").innerHTML = "Please fill all fields!";
        return;
    }
    if (password !== confirmPassword) {
        document.getElementById("result").innerHTML = "Passwords do not match!";
        return;
    }

    document.getElementById("result").innerHTML =
        "Account Created! <br>" +
        "Name: " + name + "<br>" +
        "Email: " + email + "<br>" +
        "Contact: " + contact;
}
</script>

</body>
</html>
